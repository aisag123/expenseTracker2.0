<section class="auth-page">
  <div class="auth-card" aria-labelledby="signup-title">
    <h1 id="signup-title">Create your account</h1>
    <p>Set up your profile to start tracking income and expenses.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label for="name">Full name</label>
      <input id="name" type="text" formControlName="name" autocomplete="name" />

      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" autocomplete="email" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" autocomplete="new-password" />

      <label for="confirmPassword">Confirm password</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
      />

      <button type="submit">Sign up</button>
    </form>

    @if (feedback()) {
      <p class="message" [class.error-message]="isError()">{{ feedback() }}</p>
    }

    <p class="switch-link">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </div>
</section>
