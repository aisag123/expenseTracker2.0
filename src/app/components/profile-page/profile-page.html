<section class="profile-page">
  @if (currentUser()) {
    <div class="profile-card" aria-labelledby="profile-title">
      <h1 id="profile-title">Profile management</h1>
      <p>Update your name and email.</p>

      <form [formGroup]="form" (ngSubmit)="save()" novalidate>
        <label for="name">Name</label>
        <input id="name" type="text" formControlName="name" autocomplete="name" />

        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />

        <div class="actions">
          <button type="submit">Save profile</button>
          <button class="secondary" type="button" (click)="logout()">Log out</button>
        </div>
      </form>

      @if (feedback()) {
        <p class="message" [class.error-message]="isError()">{{ feedback() }}</p>
      }
    </div>
  } @else {
    <div class="profile-card" aria-live="polite">
      <h1>You are not logged in</h1>
      <p>Create an account or log in to manage your profile.</p>
      <div class="actions">
        <a class="button-link" routerLink="/login">Go to login</a>
        <a class="button-link secondary-link" routerLink="/signup">Go to sign up</a>
      </div>
    </div>
  }
</section>
